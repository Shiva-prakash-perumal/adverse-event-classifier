name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # ─── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/test_pipeline.py -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: .pytest_cache/

  # ─── Job 2: Build Docker image ───────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t adverse-event-intelligence:${{ github.sha }} .
          docker build -t adverse-event-intelligence:latest .

      - name: Test Docker image starts
        run: |
          docker run --rm -d \
            --name test-container \
            -p 8501:8501 \
            adverse-event-intelligence:latest
          sleep 10
          docker stop test-container

  # ─── Job 3: Train model (on push to master only) ─────────────────────────────
  train:
    name: Train and Validate Model
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run training pipeline
        run: |
          python src/pipeline.py

      - name: Check model performance threshold
        run: |
          python - <<'EOF'
          import pandas as pd
          import sys

          try:
              results = pd.read_csv("models/model_comparison.csv", index_col=0)
              best_f1 = results["f1_macro"].max()
              print(f"Best F1 Macro: {best_f1:.4f}")

              # Fail CI if model performance drops below threshold
              threshold = 0.50
              if best_f1 < threshold:
                  print(f"FAIL: Best F1 {best_f1:.4f} below threshold {threshold}")
                  sys.exit(1)
              else:
                  print(f"PASS: Model performance above threshold")
          except FileNotFoundError:
              print("Model comparison file not found — skipping check")
          EOF

      - name: Upload model artifacts
        uses: actions/upload-artifact@v3
        with:
          name: model-artifacts
          path: |
            models/
            mlruns/